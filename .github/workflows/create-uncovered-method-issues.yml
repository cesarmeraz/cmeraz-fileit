name: Create Issues for Uncovered Public Methods

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  analyze-coverage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Analyze coverage and create issues for uncovered public methods
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python .github/scripts/create_uncovered_method_issues.py
